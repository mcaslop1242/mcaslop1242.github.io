<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Carrito - Librería Aurora</title>
		<link rel="stylesheet" href="css/estilos.css" />
	</head>
	
	<body>
		<!-- Header -->
		<header class="site-header">
			<div class="container header-content">
				<img src="img/main_logo.png" alt="Logo Librería Aurora" class="logo"/>
				<nav class="main-nav">
					<ul>
						<li><a href="index.html">Inicio</a></li>
						<li><a href="producto.html">Productos</a></li>
						<li><a href="contacto.html">Contacto</a></li>
					</ul>
				</nav>
				<div class="header-actions">
					
					<form action="busqueda.html" method="get" class="buscador">
						<input type="search" name="q" placeholder="Buscar..." aria-label="Buscar libros" />
					</form>
					
					<select aria-label="Seleccionar idioma">
						<option>ES</option>
						<option>EN</option>
					</select>
					
					<a href="carrito.html">
						<button class="cart-btn" aria-label="Ir al carrito">
							<img src="img/carrito.png" style="width: 18px"/>
						</button>
					</a>
				</div>
			</div>
		</header>

		<main class="carrito">
			<h1>Tu carrito</h1>
			<div class="carrito-items">
				<article class="item">
					<img src="https://cdn.shopify.com/s/files/1/1161/3498/files/9781702264211.jpg?v=1703730470&width=1200&crop=center" alt="Libro El tiempo en las sombras" />
					<div class="info">
						<h2>El tiempo en las sombras</h2>
						<p class="precio">14,90 €</p>
						<p>Cantidad: 1</p>
					</div>
				</article>

				<article class="item">
					<img src="https://www.udllibros.com/imagenes/9788418/978841853807.JPG?version=79557" alt="Libro La voz de los árboles" />
					<div class="info">
						<h2>La voz de los árboles</h2>
						<p class="precio">12,50 €</p>
						<p>Cantidad: 1</p>
					</div>
				</article>
			</div>

			<div class="resumen">
				<p>Total: <strong>27,40 €</strong></p>
				<button class="btn-comprar">Añadir producto</button>
				<button class="btn-comprar" style=color: "red">Eliminar producto</button>
				<button class="btn-comprar">Finalizar compra</button>
			</div>
		</main>

		<!-- Footer -->
		<footer class="site-footer">
			<div class="container footer-content">
				<p>© 2025 Librería Aurora</p>
				<div class="socials">
					<a aria-label="Facebook"><img src="img/facebook.png" style="width: 20px"/></a>
					<a aria-label="Instagram"><img src="img/instagram.png" style="width: 20px"/></a>
					<a aria-label="X (Twitter)"><img src="img/twitter.png" style="width: 20px"/></a>
				</div>
			</div>
		</footer>
	</body>

</html>
