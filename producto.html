<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ficha de producto - Librería Aurora</title>
		<link rel="stylesheet" href="css/estilos.css" />
	</head>
	
	<body>
		<!-- Header -->
		<header class="site-header">
			<div class="container header-content">
				<img src="img/main_logo.png" alt="Logo Librería Aurora" class="logo"/>
				<nav class="main-nav">
					<ul>
						<li><a href="index.html">Inicio</a></li>
						<li><a href="producto.html">Productos</a></li>
						<li><a href="contacto.html">Contacto</a></li>
					</ul>
				</nav>
				<div class="header-actions">
					
					<form action="busqueda.html" method="get" class="buscador">
						<input type="search" name="q" placeholder="Buscar..." aria-label="Buscar libros" />
					</form>
					
					<select aria-label="Seleccionar idioma">
						<option>ES</option>
						<option>EN</option>
					</select>
					
					<a href="carrito.html">
						<button class="cart-btn" aria-label="Ir al carrito">
							<img src="img/carrito.png" style="width: 18px"/>
						</button>
					</a>
				</div>
			</div>
		</header>

		<!-- Contenido principal -->
		<main class="producto">
			<section class="producto-grid">
				<div class="card">
					<img src="https://editorialverbum.es/wp-content/uploads/2020/12/El-jardin-secreto.jpg" alt="Portada del libro El jardín secreto">
				</div>

				<div class="producto-detalle">
					<h1>El jardín secreto</h1>
					<p class="precio">14,90 €</p>
					<ul class="caracteristicas">
						<li>Autor: Frances H. Burnett</li>
						<li>Editorial: Vicens Vives</li>
					</ul>
					<p class="descripcion">
						Una historia clásica que redescubre el poder de la naturaleza, la amistad y el cambio interior.
					</p>
					<button class="btn-comprar">Añadir al carrito</button>
				</div>
			</section>
		</main>

		<!-- Footer -->
		<footer class="site-footer">
			<div class="container footer-content">
				<p>© 2025 Librería Aurora</p>
				<div class="socials">
					<a aria-label="Facebook"><img src="img/facebook.png" style="width: 20px"/></a>
					<a aria-label="Instagram"><img src="img/instagram.png" style="width: 20px"/></a>
					<a aria-label="X (Twitter)"><img src="img/twitter.png" style="width: 20px"/></a>
				</div>
			</div>
		</footer>
	</body>

</html>
